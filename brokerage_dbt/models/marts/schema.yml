version: 2

models:
  - name: fct_daily_active_traders
    description: "Daily trading activity metrics across all users"
    columns:
      - name: trade_date
        tests:
          - not_null
          - unique
      - name: daily_active_traders
        tests:
          - not_null

  - name: fct_volume_by_ticker
    description: "Monthly trading volume breakdown by ticker and sector"
    columns:
      - name: ticker
        tests:
          - not_null
      - name: total_volume
        tests:
          - not_null

  - name: fct_user_metrics
    description: "Per-user trading metrics and retention rates"
    columns:
      - name: user_id
        tests:
          - not_null
          - unique
      - name: total_trades
        tests:
          - not_null